name: Release Version (Lerna)

on:
  push:
    branches:
      - main
    paths:
      - "packages/paperlesspaper-api/**"
      - "packages/paperlesspaper-web/**"
      - "packages/helpers/**"
      - "package.json"
      - "yarn.lock"
      - "lerna.json"
      - ".github/workflows/release-version.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-version-main
  cancel-in-progress: false

jobs:
  version:
    name: Version With Lerna
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NPMRC_CONTENT: ${{ secrets.NPMRC_CONTENT }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Configure npmrc from secret
        run: |
          if [ -z "${NPMRC_CONTENT}" ]; then
            echo "NPMRC_CONTENT is missing"
            exit 1
          fi
          printf "%s\n" "${NPMRC_CONTENT}" > .npmrc

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Lerna versioning
        run: yarn lerna:versionNoPush

      - name: Publish helpers package if version is missing
        run: |
          HELPERS_VERSION=$(node -p "require('./packages/helpers/package.json').version")
          echo "helpers version: ${HELPERS_VERSION}"

          if npm view "@paperlesspaper/helpers@${HELPERS_VERSION}" version >/dev/null 2>&1; then
            echo "@paperlesspaper/helpers@${HELPERS_VERSION} already published"
          else
            if [ -z "${NPM_TOKEN}" ]; then
              echo "NPM_TOKEN is missing"
              exit 1
            fi

            printf "//registry.npmjs.org/:_authToken=%s\n" "${NPM_TOKEN}" >> .npmrc
            echo "Publishing @paperlesspaper/helpers@${HELPERS_VERSION}"
            yarn --cwd packages/helpers build
            (cd packages/helpers && npm publish --access public)
          fi

      - name: Push commit and tags
        run: git push --follow-tags
