name: Deploy Paperlesspaper API (Fly.io)

on:
  workflow_run:
    workflows:
      - Release Version (Lerna)
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to Fly.io
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Restore Firebase Admin SDK key
        run: |
          if [ -z "${FIREBASE_ADMINSDK_JSON}" ]; then
            echo "FIREBASE_ADMINSDK_JSON is missing"
            exit 1
          fi
          printf "%s" "${FIREBASE_ADMINSDK_JSON}" > memo-2e24c-firebase-adminsdk-tjkbf-68c91d96da.json
        working-directory: packages/paperlesspaper-api
        env:
          FIREBASE_ADMINSDK_JSON: ${{ secrets.FIREBASE_ADMINSDK_JSON }}

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only --config fly.toml
          flyctl scale count 1 --app paperlesspaper-api --yes
        working-directory: packages/paperlesspaper-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
