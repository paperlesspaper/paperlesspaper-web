name: Deploy Paperlesspaper API (Fly.io)

on:
  push:
    branches:
      - main
    paths:
      - "packages/paperlesspaper-api/**"
      - "packages/helpers/**"
      - "package.json"
      - "yarn.lock"
      - "lerna.json"
      - ".github/workflows/deploy-paperlesspaper-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run API tests
        run: yarn --cwd packages/paperlesspaper-api test

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        working-directory: packages/paperlesspaper-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
