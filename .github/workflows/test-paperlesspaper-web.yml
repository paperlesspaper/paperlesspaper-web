name: Test Paperlesspaper Web

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: test-web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn --cwd packages/paperlesspaper-web playwright install --with-deps chromium

      - name: Create API test environment
        run: |
          cat > packages/paperlesspaper-api/.env.playwright.ci <<EOF
          NODE_ENV=test
          AUTH0_DOMAIN=${AUTH0_DOMAIN}
          AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
          AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
          AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
          AUTH0_MANAGEMENT_DOMAIN=${AUTH0_MANAGEMENT_DOMAIN}
          AUTH0_MANAGEMENT_AUDIENCE=${AUTH0_MANAGEMENT_AUDIENCE}
          AUTH0_MANAGEMENT_CLIENT_ID=${AUTH0_MANAGEMENT_CLIENT_ID}
          AUTH0_MANAGEMENT_CLIENT_SECRET=${AUTH0_MANAGEMENT_CLIENT_SECRET}
          AWS_REGION=${AWS_REGION}
          AWS_IOT_HOST=${AWS_IOT_HOST}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
          FRONTEND_URL=http://localhost:3200
          IOT_API_URL=${IOT_API_URL}
          IOT_API_URL_EPAPER=${IOT_API_URL_EPAPER}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          GOOGLE_REDIRECT_URI=http://localhost:3200
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_ENDPOINT_SECRET_KEY=${STRIPE_ENDPOINT_SECRET_KEY}
          STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
          STRIPE_PRICE_ID_RENTAL=${STRIPE_PRICE_ID_RENTAL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
          TRANSLATION_SECRET=${TRANSLATION_SECRET}
          REACT_APP_TRANSLATION_SECRET=${REACT_APP_TRANSLATION_SECRET}
          REACT_APP_WEB_BACKEND_URL=${REACT_APP_WEB_BACKEND_URL}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
          FIREBASE_PRIVATE_KEY_BASE64=${FIREBASE_PRIVATE_KEY_BASE64}
          EOF
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_MANAGEMENT_DOMAIN: ${{ secrets.AUTH0_MANAGEMENT_DOMAIN }}
          AUTH0_MANAGEMENT_AUDIENCE: ${{ secrets.AUTH0_MANAGEMENT_AUDIENCE }}
          AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
          AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
          AWS_IOT_HOST: ${{ secrets.AWS_IOT_HOST }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          IOT_API_URL: ${{ secrets.IOT_API_URL }}
          IOT_API_URL_EPAPER: ${{ secrets.IOT_API_URL_EPAPER }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_ENDPOINT_SECRET_KEY: ${{ secrets.STRIPE_ENDPOINT_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_PRICE_ID_RENTAL: ${{ secrets.STRIPE_PRICE_ID_RENTAL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TRANSLATION_SECRET: ${{ secrets.TRANSLATION_SECRET }}
          REACT_APP_TRANSLATION_SECRET: ${{ secrets.REACT_APP_TRANSLATION_SECRET }}
          REACT_APP_WEB_BACKEND_URL: ${{ secrets.REACT_APP_WEB_BACKEND_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY_BASE64: ${{ secrets.FIREBASE_PRIVATE_KEY_BASE64 }}

      - name: Run Playwright tests
        run: yarn test:e2e:blank-db
        working-directory: packages/paperlesspaper-web
        env:
          CI: true
          PLAYWRIGHT_API_ENV_FILE: .env.playwright.ci
          PLAYWRIGHT_AUTH_EMAIL: ${{ secrets.PLAYWRIGHT_AUTH_EMAIL }}
          PLAYWRIGHT_AUTH_PASSWORD: ${{ secrets.PLAYWRIGHT_AUTH_PASSWORD }}
          PLAYWRIGHT_BASE_URL: http://localhost:3200
          REACT_APP_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          REACT_APP_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          REACT_APP_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/paperlesspaper-web/playwright-report/
          if-no-files-found: ignore
