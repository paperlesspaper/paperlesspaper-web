# fly.toml app configuration file generated for memo-api on 2024-11-30T18:36:07+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paperlesspaper-api'
primary_region = 'ams'

[build]
  [build.args]
    NODE_VERSION = "24"

[deploy]
  strategy = 'immediate'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
